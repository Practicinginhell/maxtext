# Model config for Qwen3.5-2B

decoder_block: "qwen3_5"

# Core architectural parameters
base_emb_dim: 2048
base_num_decoder_layers: 24
base_num_query_heads: 8
base_num_kv_heads: 2
head_dim: 256
base_mlp_dim: 6144
base_moe_mlp_dim: 6144
mlp_activations: ["silu", "linear"]
vocab_size: 248320
normalization_layer_epsilon: 1.0e-6

# Qwen3.5 linear attention parameters
inhomogeneous_layer_cycle_interval: 4
gdn_conv_kernel_dim: 4
gdn_key_head_dim: 128
gdn_value_head_dim: 128
gdn_num_key_heads: 16
gdn_num_value_heads: 16
gdn_chunk_size: 64
use_qk_norm_in_gdn: True

# The current Qwen3.5 layer implementation reuses the sparse block. A single
# routed expert is equivalent to the dense SwiGLU MLP after conversion.
num_experts: 1
num_experts_per_tok: 1
shared_experts: 0
norm_topk_prob: True

# RoPE settings
rope_max_timescale: 10000000
partial_rotary_factor: 0.25
use_qk_norm: True

# General model settings
logits_via_embedding: True
normalize_embedding_logits: False
enable_dropout: False
tokenizer_type: "huggingface"
